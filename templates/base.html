<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Love Pool Care CRM{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('dashboard') }}" class="nav-brand">
            <i class="fas fa-swimming-pool"></i>
            <span>Love Pool Care CRM</span>
        </a>
        <ul class="nav-menu">
            <li><a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}">
                <i class="fas fa-dashboard"></i> Dashboard
            </a></li>
            <li><a href="{{ url_for('pipeline_view', pipeline_id='service') }}" class="{% if 'pipeline' in request.endpoint %}active{% endif %}">
                <i class="fas fa-stream"></i> Pipelines
            </a></li>
            <li><a href="{{ url_for('contacts_list') }}" class="{% if 'contact' in request.endpoint %}active{% endif %}">
                <i class="fas fa-users"></i> Contacts
            </a></li>
            <li><a href="{{ url_for('deals_list') }}" class="{% if 'deal' in request.endpoint %}active{% endif %}">
                <i class="fas fa-handshake"></i> Opportunities
            </a></li>
            <li><a href="{{ url_for('sales_report') }}" class="{% if 'report' in request.endpoint %}active{% endif %}">
                <i class="fas fa-chart-bar"></i> Reports
            </a></li>
        </ul>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
